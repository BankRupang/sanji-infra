name: Gemini Code Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v3

      - name: Get git diff for PR
        env:
          EVENT_ACTION: ${{ github.event.action }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          COMMIT_BEFORE: ${{ github.event.before }}
          COMMIT_AFTER: ${{ github.event.after }}
        run: |
          if [ "$EVENT_ACTION" == "opened" ]; then
            # PR 오픈 시: Base와 Head 브랜치 간 전체 diff 추출
            git fetch origin "$BASE_REF"
            git fetch origin "$HEAD_REF"
            git diff "origin/$BASE_REF"..."origin/$HEAD_REF" > diff.txt

          elif [ "$EVENT_ACTION" == "synchronize" ]; then
            echo "Extracting incremental diffs..."
            git log --no-merges -p "$COMMIT_BEFORE".."$COMMIT_AFTER" > diff.txt
            git log --merges --format="%H" "$COMMIT_BEFORE".."$COMMIT_AFTER" | while read commit_hash; do
              git show --format="" --cc "$commit_hash" >> diff.txt
            done
          fi

      - name: Run Gemini Review
        id: gemini_review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const diff_output = fs.readFileSync("diff.txt", "utf8");

            if (!diff_output.trim()) {
              fs.writeFileSync("review_result.txt", "새로운 커밋에 변경된 코드 내역이 없습니다.");
              console.log("No diff found. Skipping API call.");
              return;
            }

            let promptBase = "";
            try {
              promptBase = fs.readFileSync("prompts/code_review.txt", "utf8");
            } catch (err) {
              console.error("프롬프트 파일을 읽는 데 실패했습니다. 파일 경로를 확인해주세요.", err);
              return;
            }

            const prompt = `
            ${promptBase}
            
            Below is the git diff:
            
              <git diff>
              ${diff_output}
              </git diff>
              `;
            
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.GEMINI_API_KEY}`,
                "HTTP-Referer": "https://github.com",
                "X-Title": "GitHub Actions Code Review",
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "google/gemini-2.5-flash",
                messages: [{ role: "user", content: prompt }]
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`OpenRouter API request failed: ${errorText}`);
            }

            const data = await response.json();
            const text = data.choices[0].message.content;
            
            fs.writeFileSync("review_result.txt", text);
            console.log("Review results saved!");

      - name: Comment on Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("review_result.txt", "utf8");
            
            const pr_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body
            });
