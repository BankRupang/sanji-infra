name: Terraform Code Review

on:
  issue_comment:
    types: [created]

jobs:
  code-review:
    # 레포지토리가 private이 아닐 때, PR 댓글이고, '/review'로 시작할 때만 실행
    if: ${{ !github.event.repository.private && github.event.issue.pull_request && startsWith(github.event.comment.body, '/review') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check PR base branch
        id: check_branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub CLI로 PR 정보 조회하여 target branch(base) 확인
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json baseRefName)
          BASE_REF=$(echo $PR_DATA | jq -r '.baseRefName')
          
          if [ "$BASE_REF" != "main" ]; then
            echo "is_main=false" >> $GITHUB_OUTPUT
            echo "이 PR은 main 브랜치를 타겟으로 하지 않습니다. 리뷰를 건너뜁니다."
          else
            echo "is_main=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout PR Branch
        if: steps.check_branch.outputs.is_main == 'true'
        uses: actions/checkout@v3
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - name: Set up Node
        if: steps.check_branch.outputs.is_main == 'true'
        uses: actions/setup-node@v3

      - name: Get git diff for PR
        if: steps.check_branch.outputs.is_main == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.issue.number }} > diff.txt
          gh pr view ${{ github.event.issue.number }} --json files --jq '.files[].path' > changed_files.txt

      - name: Get full content of changed files
        if: steps.check_branch.outputs.is_main == 'true'
        run: node .github/scripts/extract_context.js changed_files.txt diff.txt > full_context.txt

      - name: Run Gemini Review
        if: steps.check_branch.outputs.is_main == 'true'
        id: gemini_review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const diff_output = fs.readFileSync("diff.txt", "utf8");

            if (!diff_output.trim()) {
              fs.writeFileSync("review_result.txt", "새로운 커밋에 변경된 코드 내역이 없습니다.");
              console.log("No diff found. Skipping API call.");
              return;
            }

            let promptBase = "";
            try {
              promptBase = fs.readFileSync("prompts/code_review.txt", "utf8");
            } catch (err) {
              console.error("프롬프트 파일을 읽는 데 실패했습니다. 파일 경로를 확인해주세요.", err);
              return;
            }

            let fullContext = "";
            try {
              const raw = fs.readFileSync("full_context.txt", "utf8");
              if (raw.trim()) fullContext = raw;
            } catch (err) {
              console.log("full_context.txt not found, skipping.");
            }

            const prompt = `
            ${promptBase}

            Below is the git diff:

              <git diff>
              ${diff_output}
              </git diff>

              ${fullContext ? `Below is the full current content of each changed file. Use this to cross-reference and avoid suggesting changes that are already present in the file:

              <full file content>
              ${fullContext}
              </full file content>` : ""}
              `;
            
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.GEMINI_API_KEY}`,
                "HTTP-Referer": "https://github.com",
                "X-Title": "GitHub Actions Code Review",
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                model: "google/gemini-3-flash-preview",
                messages: [{ role: "user", content: prompt }]
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`OpenRouter API request failed: ${errorText}`);
            }

            const data = await response.json();
            const text = data.choices[0].message.content;
            
            fs.writeFileSync("review_result.txt", text);
            console.log("Review results saved!");

      - name: Comment on Pull Request
        if: steps.check_branch.outputs.is_main == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("review_result.txt", "utf8");

            const pr_number = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body
            });